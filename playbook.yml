- name: Test roles
  hosts: all
  gather_facts: true
  become: true
  vars_files:
    - vars.yml
  pre_tasks:
    - name: Ping
      ansible.builtin.ping:
  roles:
    - role: haproxy
      tags: haproxy
      vars:
        haproxy_served_domains:
          - example.com
    - role: tls_certificate
      tags: tls_certificate
      vars:
        tls_certificate_email: "{{ lookup('env', 'TLS_CERT_EMAIL') }}"
        tls_certificate_cloudflare_dns_api_token: "{{ lookup('env', 'CLOUDFLARE_DNS_API_TOKEN') }}"
    - role: cloudflare_ips
      tags: cloudflare_ips
    - role: coraza
      tags: coraza
    - role: crowdsec
      tags: crowdsec
    - role: node_exporter
      tags: node_exporter
    - role: vmagent
      tags: vmagent
      vars:
        vmagent_remote_write_url: "{{ lookup('env', 'VMAGENT_REMOTE_WRITE_URL') | default('http://localhost:8428/api/v1/write', true) }}"
        vmagent_allow_insecure_url: true
    - role: promtail
      tags: promtail
      vars:
        promtail_remote_write_url: "{{ lookup('env', 'PROMTAIL_REMOTE_WRITE_URL') | default('http://localhost:3100/loki/api/v1/push', true) }}"
        promtail_allow_insecure_url: true
    - role: pushgateway
      tags: pushgateway
    - role: k8s_oidc_github_pages
      tags: k8s_oidc_github_pages
      vars:
        k8s_oidc_github_pages_repository_name: ansible-collections
        k8s_oidc_github_pages_repository_owner: meysam81
        k8s_oidc_github_pages_github_deploy_key: dummy
    - role: kratos
      tags: kratos
    - role: oathkeeper
      tags: oathkeeper
    - role: vm_identity_gcp
      tags: vm_identity_gcp
