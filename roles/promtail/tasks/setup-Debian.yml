---
- name: Assert remote_write_url is defined
  ansible.builtin.assert:
    that:
      - promtail_remote_write_url is defined
      - promtail_remote_write_url | length > 0
    fail_msg: "promtail_remote_write_url must be defined and non-empty (got: {{ promtail_remote_write_url | default('undefined') }})"
- name: Assert remote_write_url uses HTTPS
  ansible.builtin.assert:
    that:
      - promtail_remote_write_url is regex('^https://')
    fail_msg: "promtail_remote_write_url must use HTTPS (got: {{ promtail_remote_write_url }})"
  when: not (promtail_allow_insecure_url | bool)
- name: Download and read sha256sum file
  ansible.builtin.set_fact:
    promtail_sha256sum_file_content: "{{ lookup('ansible.builtin.url', promtail_sha256sum_url, wantlist=True) }}"
  when:
    - promtail_version | default('') | length > 0
    - promtail_sha256sum_url | default('') | length > 0
- name: Extract SHA256 checksums for {{ promtail_url | basename }}
  ansible.builtin.set_fact:
    promtail_sha256sum: "{{ promtail_sha256sum_file_content | select('search', promtail_url | basename) | map('split', ' ') | map('first') | list | first }}"
  when:
    - promtail_version | default('') | length > 0
    - promtail_sha256sum_url | default('') | length > 0
- name: Create secure temp directory
  ansible.builtin.tempfile:
    state: directory
    prefix: promtail_
  register: promtail_tmp_dir
- name: Download promtail
  ansible.builtin.get_url:
    url: "{{ promtail_url }}"
    dest: "{{ promtail_tmp_dir.path }}/{{ promtail_url | basename }}"
    mode: "0444"
    owner: "{{ promtail_user }}"
    group: "{{ promtail_group }}"
    checksum: "{{ 'sha256:' + promtail_sha256sum if promtail_sha256sum else None }}"
  register: promtail_download
- name: Extract promtail
  ansible.builtin.unarchive:
    src: "{{ promtail_tmp_dir.path }}/{{ promtail_url | basename }}"
    dest: "{{ promtail_tmp_dir.path }}/"
    owner: root
    group: root
    remote_src: true
    list_files: true
    include:
      - promtail-{{ promtail_os }}-{{ promtail_arch }}
  register: promtail_extract
- name: Install promtail binary
  ansible.builtin.copy:
    src: "{{ promtail_extract.dest }}/{{ promtail_extract.files | first }}"
    dest: /usr/local/bin/promtail
    owner: root
    group: root
    mode: "0555"
    remote_src: true
  notify: Restart promtail
- name: Clean up promtail temp files
  ansible.builtin.file:
    path: "{{ promtail_tmp_dir.path }}"
    state: absent
- name: Create promtail relevant dir
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: promtail
    group: promtail
    mode: "0755"
  loop:
    - /etc/promtail
    - /var/lib/promtail
- name: Fetch promtail remote write password file
  ansible.builtin.copy:
    content: "{{ promtail_remote_write_password }}"
    dest: /var/lib/promtail/remote-password-file
    owner: promtail
    group: promtail
    mode: "0400"
  no_log: true
  notify: Restart promtail
  when: promtail_remote_write_password is defined
- name: Copy promtail config file
  ansible.builtin.template:
    src: promtail.yml.j2
    dest: /etc/promtail/promtail.yml
    owner: promtail
    group: promtail
    mode: "0440"
  notify: Restart promtail
- name: Create promtail service
  ansible.builtin.template:
    src: promtail.service.j2
    dest: /etc/systemd/system/promtail.service
    owner: root
    group: root
    mode: "0644"
  notify: Restart promtail
- name: Start promtail service
  ansible.builtin.systemd:
    name: promtail
    state: started
    enabled: true
    daemon_reload: true
