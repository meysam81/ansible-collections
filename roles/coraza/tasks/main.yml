---
- name: Install dependencies
  ansible.builtin.apt:
    name:
      - git
    state: present
    update_cache: true

- name: Create secure build directory
  ansible.builtin.tempfile:
    state: directory
    prefix: coraza_build_
  register: coraza_build_dir

- name: Clone coraza-spoa
  ansible.builtin.git:
    repo: https://github.com/corazawaf/coraza-spoa.git
    version: "{{ coraza_spoa_commit if coraza_spoa_commit else 'v' + coraza_spoa_version }}"
    dest: "{{ coraza_build_dir.path }}/coraza-spoa"

- name: Deploy coraza SPOE config
  ansible.builtin.template:
    src: coraza.cfg.j2
    dest: "{{ haproxy_config_dir }}/coraza.cfg"
    owner: haproxy
    group: haproxy
    mode: "0640"
  notify: Restart coraza-spoa service

- name: Create coraza-spoa user
  ansible.builtin.user:
    name: coraza-spoa
    system: true
    shell: /bin/false
    create_home: false

- name: Create coraza-spoa directories
  ansible.builtin.file:
    path: "{{ coraza_config_dir }}"
    state: directory
    owner: coraza-spoa
    group: coraza-spoa
    mode: "0755"

- name: Deploy coraza server config
  ansible.builtin.template:
    src: coraza-server-config.yml.j2
    dest: "{{ coraza_config_dir }}/config.yml"
    owner: coraza-spoa
    group: coraza-spoa
    mode: "0644"
  notify: Restart coraza-spoa service

- name: Download coraza recommended config
  ansible.builtin.get_url:
    url: "https://github.com/corazawaf/coraza/raw/refs/tags/v{{ coraza_config_version }}/coraza.conf-recommended"
    dest: "{{ coraza_config_dir }}/coraza.conf"
    owner: coraza-spoa
    group: coraza-spoa
    mode: "0644"

- name: Clone CRS rules
  ansible.builtin.git:
    repo: https://github.com/coreruleset/coreruleset
    version: "{{ coreruleset_commit if coreruleset_commit else 'v' + coreruleset_version }}"
    dest: "{{ coraza_build_dir.path }}/coreruleset"

- name: Copy CRS setup config
  ansible.builtin.copy:
    src: "{{ coraza_build_dir.path }}/coreruleset/crs-setup.conf.example"
    dest: "{{ coraza_config_dir }}/crs-setup.conf"
    owner: coraza-spoa
    group: coraza-spoa
    mode: "0644"
    remote_src: true
    force: false

- name: Copy CRS rules
  ansible.builtin.copy:
    src: "{{ coraza_build_dir.path }}/coreruleset/rules/"
    dest: "{{ coraza_config_dir }}/rules/"
    owner: coraza-spoa
    group: coraza-spoa
    mode: "0644"
    remote_src: true

- name: Copy CRS plugins
  ansible.builtin.copy:
    src: "{{ coraza_build_dir.path }}/coreruleset/plugins/"
    dest: "{{ coraza_config_dir }}/plugins/"
    owner: coraza-spoa
    group: coraza-spoa
    mode: "0644"
    remote_src: true

- name: Deploy coraza systemd service
  ansible.builtin.template:
    src: coraza-spoa.service.j2
    dest: /etc/systemd/system/coraza-spoa.service
    owner: root
    group: root
    mode: "0644"
  notify: Restart coraza-spoa service

- name: Build coraza-spoa
  ansible.builtin.command:
    cmd: "{{ go_install_dir }}/go/bin/go run mage.go build"
    chdir: "{{ coraza_build_dir.path }}/coraza-spoa"
    creates: "{{ coraza_build_dir.path }}/coraza-spoa/build/coraza-spoa"
  environment:
    PATH: "{{ go_install_dir }}/go/bin:{{ ansible_env.PATH }}"

- name: Copy coraza-spoa binary
  ansible.builtin.copy:
    src: "{{ coraza_build_dir.path }}/coraza-spoa/build/coraza-spoa"
    dest: /usr/local/bin/coraza-spoa
    owner: root
    group: root
    mode: "0755"
    remote_src: true
  notify: Start coraza-spoa service

- name: Clean up coraza build directory
  ansible.builtin.file:
    path: "{{ coraza_build_dir.path }}"
    state: absent
