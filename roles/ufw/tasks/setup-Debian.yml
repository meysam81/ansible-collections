---
- name: Validate UFW rule types
  ansible.builtin.assert:
    that:
      - item.rule in ['allow', 'deny', 'reject', 'limit']
    fail_msg: "Invalid rule type '{{ item.rule }}' — must be allow, deny, reject, or limit"
  loop: "{{ ufw_rules }}"
  loop_control:
    label: "{{ item.comment | default(item.rule + ' ' + (item.port | default('any'))) }}"
  when: ufw_rules | length > 0

- name: Install ufw
  ansible.builtin.apt:
    name:
      - ufw
    state: present
    update_cache: true

- name: Reset UFW rules
  community.general.ufw:
    state: reset
  when: ufw_reset_before_apply

- name: Set UFW default incoming policy
  community.general.ufw:
    direction: incoming
    default: "{{ ufw_default_incoming }}"

- name: Set UFW default outgoing policy
  community.general.ufw:
    direction: outgoing
    default: "{{ ufw_default_outgoing }}"

- name: Set UFW logging level
  community.general.ufw:
    logging: "{{ ufw_logging }}"

- name: Apply UFW rules
  community.general.ufw:
    rule: "{{ item.rule }}"
    port: "{{ item.port | default(omit) }}"
    proto: "{{ item.proto | default(omit) }}"
    from_ip: "{{ item.from_ip | default(omit) }}"
    to_ip: "{{ item.to_ip | default(omit) }}"
    comment: "{{ item.comment | default(omit) }}"
    direction: "{{ item.direction | default(omit) }}"
    route: "{{ item.route | default(omit) }}"
  loop: "{{ ufw_rules }}"
  loop_control:
    label: "{{ item.comment | default(item.rule + ' ' + (item.port | default('any'))) }}"

- name: Enable UFW
  community.general.ufw:
    state: enabled
  when: ufw_enabled

- name: Disable UFW
  community.general.ufw:
    state: disabled
  when: not ufw_enabled
