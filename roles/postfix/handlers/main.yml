---
- name: Reload postfix
  ansible.builtin.systemd:
    name: postfix
    state: reloaded
    enabled: true

- name: Restart postfix
  ansible.builtin.systemd:
    name: postfix
    state: restarted
    enabled: true

- name: Postmap virtual aliases
  ansible.builtin.command:
    cmd: postmap /etc/postfix/virtual_aliases
  changed_when: true

- name: Reload systemd daemon
  ansible.builtin.systemd:
    daemon_reload: true
