---
- name: Install squid
  ansible.builtin.apt:
    name: squid
    state: present
    update_cache: true
    cache_valid_time: 3600

- name: Deploy CrowdSec squid helper script
  ansible.builtin.template:
    src: crowdsec-squid-helper.sh.j2
    dest: /usr/local/bin/crowdsec-squid-helper
    owner: root
    group: root
    mode: "0755"
  when: squid_crowdsec_enabled
  notify: Restart squid

- name: Deploy squid configuration
  ansible.builtin.template:
    src: squid.conf.j2
    dest: /etc/squid/squid.conf
    owner: root
    group: root
    mode: "0644"
    validate: squid -k parse -f %s
  notify: Restart squid

- name: Enable and start squid
  ansible.builtin.systemd:
    name: squid
    state: started
    enabled: true
    daemon_reload: true
