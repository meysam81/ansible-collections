---
- name: Install squid
  ansible.builtin.apt:
    name: squid
    state: present
    update_cache: true
    cache_valid_time: 3600

- name: Ensure squid log directory exists
  ansible.builtin.file:
    path: /var/log/squid
    state: directory
    owner: proxy
    group: proxy
    mode: "0750"

- name: Check for existing CrowdSec bouncer key
  ansible.builtin.stat:
    path: /etc/squid/crowdsec-bouncer.key
  register: squid_crowdsec_key_stat
  when: squid_crowdsec_enabled

- name: Register CrowdSec bouncer for Squid
  ansible.builtin.command:
    cmd: cscli bouncers add squid-helper -o raw
  register: squid_crowdsec_bouncer_result
  changed_when: true
  when:
    - squid_crowdsec_enabled
    - not squid_crowdsec_key_stat.stat.exists

- name: Save CrowdSec bouncer key
  ansible.builtin.copy:
    content: "{{ squid_crowdsec_bouncer_result.stdout }}"
    dest: /etc/squid/crowdsec-bouncer.key
    owner: root
    group: proxy
    mode: "0640"
  when:
    - squid_crowdsec_enabled
    - squid_crowdsec_bouncer_result is changed

- name: Deploy CrowdSec squid helper script
  ansible.builtin.template:
    src: crowdsec-squid-helper.sh.j2
    dest: /usr/local/bin/crowdsec-squid-helper
    owner: root
    group: root
    mode: "0755"
  when: squid_crowdsec_enabled
  notify: Restart squid

- name: Deploy squid configuration
  ansible.builtin.template:
    src: squid.conf.j2
    dest: /etc/squid/squid.conf
    owner: root
    group: root
    mode: "0644"
    validate: squid -k parse -f %s
  notify: Restart squid

- name: Enable and start squid
  ansible.builtin.systemd:
    name: squid
    state: started
    enabled: true
    daemon_reload: true
