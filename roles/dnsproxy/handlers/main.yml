---
- name: Read dnsproxy sysctl config
  ansible.builtin.command:
    cmd: sysctl -p /etc/sysctl.d/50-dnsproxy.conf
  changed_when: false

- name: Enable and start dnsproxy
  ansible.builtin.systemd:
    name: dnsproxy
    state: started
    enabled: true
    daemon_reload: true

- name: Restart dnsproxy
  ansible.builtin.systemd:
    name: dnsproxy
    state: restarted
    daemon_reload: true
    enabled: true
