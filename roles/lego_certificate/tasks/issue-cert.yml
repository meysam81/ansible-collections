---
- name: "Resolve cert paths for {{ cert.name }}"
  ansible.builtin.set_fact:
    lego_certificate_cert_path: "{{ lego_certificate_cert_dir }}/{{ cert.name }}.crt"
    lego_certificate_key_path: "{{ lego_certificate_cert_dir }}/{{ cert.name }}.key"

- name: "Stat cert {{ cert.name }}"
  ansible.builtin.stat:
    path: "{{ lego_certificate_cert_path }}"
  register: lego_certificate_cert_stat

- name: "Issue cert via lego for {{ cert.name }}"
  ansible.builtin.command:
    cmd: >-
      {{ lego_certificate_lego_bin }}
      --accept-tos
      --email {{ lego_certificate_email | quote }}
      --dns cloudflare
      {% if cert.key_type is defined %}--key-type {{ cert.key_type }}{% endif %}
      --path /etc/lego
      {% for d in cert.domains %} -d {{ d | quote }}{% endfor %}
      run
  environment:
    CLOUDFLARE_DNS_API_TOKEN: "{{ lego_certificate_cloudflare_dns_api_token }}"
  register: lego_certificate_lego_run
  # rc==0 + the gating "when" clause means the cert didn't exist before the
  # run AND lego succeeded — i.e. it was just issued. This is more robust
  # than matching lego's stderr text, which has changed across versions.
  changed_when: lego_certificate_lego_run.rc == 0
  when: not lego_certificate_cert_stat.stat.exists
  no_log: true

- name: "Apply cert ownership/mode for {{ cert.name }}"
  ansible.builtin.file:
    path: "{{ lego_certificate_cert_path }}"
    owner: "{{ cert.cert_owner | default('root') }}"
    group: "{{ cert.cert_group | default('root') }}"
    mode: "{{ cert.cert_mode | default('0644') }}"
  when: lego_certificate_cert_stat.stat.exists or (lego_certificate_lego_run.changed | default(false))

- name: "Apply key ownership/mode for {{ cert.name }}"
  ansible.builtin.file:
    path: "{{ lego_certificate_key_path }}"
    owner: "{{ cert.key_owner | default('root') }}"
    group: "{{ cert.key_group | default('root') }}"
    mode: "{{ cert.key_mode | default('0640') }}"
  when: lego_certificate_cert_stat.stat.exists or (lego_certificate_lego_run.changed | default(false))

- name: "Run reload commands on initial issue for {{ cert.name }}"
  ansible.builtin.shell:
    cmd: "{{ item }}"
  loop: "{{ cert.reload_commands | default([]) }}"
  loop_control:
    label: "{{ cert.name }}"
  # Only fires on an actual fresh issue (the lego run task wasn't skipped
  # AND lego returned 0). Skipping is safe — the systemd renewal timer will
  # invoke reload_commands on the next renewal anyway.
  when:
    - lego_certificate_lego_run is defined
    - not (lego_certificate_lego_run.skipped | default(false))
    - lego_certificate_lego_run.rc | default(1) == 0
  register: lego_certificate_initial_reload
  changed_when: true
  # Failed reloads on initial issue are usually because target services
  # haven't been deployed yet (e.g. haproxy not running on a fresh box).
  # Surface them in the play log but don't abort — end-of-play handlers
  # cover the actual reload after all roles run.
  failed_when: false
