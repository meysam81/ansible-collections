---
- name: Create haproxy user
  ansible.builtin.user:
    name: haproxy
    system: true
    shell: /bin/false
    home: /var/lib/haproxy
    create_home: false

- name: Create HAProxy directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: haproxy
    group: haproxy
    mode: "0755"
  loop:
    - "{{ haproxy_config_dir }}"
    - "{{ haproxy_errors_dir }}"

- name: Create HAProxy certificate directory
  ansible.builtin.file:
    path: "{{ haproxy_certs_dir }}"
    state: directory
    owner: haproxy
    group: haproxy
    mode: "0750"

- name: Copy HAProxy error files from build
  ansible.builtin.copy:
    src: /usr/local/share/haproxy/errors/
    dest: "{{ haproxy_errors_dir }}/"
    owner: haproxy
    group: haproxy
    mode: "0644"
    remote_src: true
  failed_when: false

- name: Copy custom error pages
  ansible.builtin.copy:
    src: "errors/"
    dest: "{{ haproxy_errors_dir }}/"
    owner: haproxy
    group: haproxy
    mode: "0644"
