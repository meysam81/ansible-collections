---
# Restic repository URL. For S3-compatible stores: "s3:<endpoint>/<bucket>/<path>".
# For local: "/path/to/repo". For SFTP: "sftp:user@host:/path". Required.
restic_repo_url: ""

# Encryption password for the repository. Caller MUST resolve via secret store
# (SSM, vault) and pass at playbook time. Protected with no_log throughout.
restic_password: ""

# S3 / S3-compatible credentials. Required when restic_repo_url is "s3:...".
# Caller resolves these via secret store and passes at playbook time.
restic_aws_access_key_id: ""
restic_aws_secret_access_key: ""

# Optional: extra environment variables (e.g. RESTIC_CACHE_DIR override).
# Each entry is "KEY=value". Rendered into the env file as-is.
restic_extra_env: []

# Persistent restic cache dir. The systemd unit's ProtectHome=read-only
# would otherwise force the default /root/.cache/restic to read-only and
# trigger a no-cache fallback (3-5x slower, 3-5x more S3 GET requests).
# Pre-created by the role and added to the unit's ReadWritePaths.
restic_cache_dir: /var/cache/restic

# Paths to back up. At least one is required.
restic_paths: []

# Glob patterns excluded from backup (passed to restic --exclude).
restic_exclude_patterns: []

# Retention policy. Pruned via `restic forget --prune` after each successful
# backup run. Set any of these to 0 to disable that bucket.
restic_keep_daily: 7
restic_keep_weekly: 4
restic_keep_monthly: 12
restic_keep_yearly: 0

# Backup schedule (systemd OnCalendar format).
restic_backup_on_calendar: "*-*-* 03:00:00"
restic_backup_random_delay_sec: 1800

# Integrity check schedule. The check job verifies metadata + a sampled subset
# of pack files. Disable if your backend bills per request and check costs
# outweigh the value.
restic_check_enabled: true
restic_check_read_data_subset: "10%"
restic_check_on_calendar: "Sun *-*-* 04:00:00"
restic_check_random_delay_sec: 600

# Tag applied to automatic snapshots.
restic_snapshot_tag: "auto"

# Initialise the repository on first run if it doesn't exist. Set to false
# once your repo is established to fail loudly on accidental misconfig.
restic_init_if_missing: true
