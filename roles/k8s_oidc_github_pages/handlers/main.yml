---
- name: Start the k8s oidc github pages systemd timer
  ansible.builtin.systemd:
    name: k8s-oidc-github-pages.timer
    enabled: true
    daemon_reload: true
    state: started
- name: Start the k8s oidc github pages systemd service
  ansible.builtin.systemd:
    name: k8s-oidc-github-pages.service
    daemon_reload: true
    state: started
  register: _k8s_oidc_github_pages_start
  failed_when:
    - _k8s_oidc_github_pages_start.failed
    - not (lookup('env', 'CI') | default('false') | bool)
