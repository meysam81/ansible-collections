---
- name: Install dante-server
  ansible.builtin.apt:
    name: dante-server
    state: present
    update_cache: true
    cache_valid_time: 3600

- name: Set dante binary path
  ansible.builtin.set_fact:
    dante_sockd_bin: danted

- name: Configure dante
  ansible.builtin.import_tasks: configure.yml

- name: Create systemd override directory
  ansible.builtin.file:
    path: /etc/systemd/system/danted.service.d
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Deploy systemd hardening override
  ansible.builtin.template:
    src: danted-hardening.conf.j2
    dest: /etc/systemd/system/danted.service.d/hardening.conf
    owner: root
    group: root
    mode: "0644"
  notify: Restart danted
