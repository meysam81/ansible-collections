---
- name: Create dante system user
  ansible.builtin.user:
    name: "{{ dante_user }}"
    system: true
    shell: /usr/sbin/nologin
    home: /nonexistent
    create_home: false

- name: Deploy danted.conf
  ansible.builtin.template:
    src: danted.conf.j2
    dest: /etc/danted.conf
    owner: root
    group: root
    mode: "0644"
    validate: "{{ dante_sockd_bin }} -Vf %s"
  notify: Restart danted

- name: Deploy logrotate config
  ansible.builtin.template:
    src: danted-logrotate.j2
    dest: /etc/logrotate.d/danted
    owner: root
    group: root
    mode: "0644"

- name: Enable and start danted
  ansible.builtin.systemd:
    name: danted
    state: started
    enabled: true
    daemon_reload: true
