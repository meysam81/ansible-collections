---
- name: Check installed Go version
  ansible.builtin.command:
    cmd: "{{ go_install_dir }}/go/bin/go version"
  register: go_installed_version
  changed_when: false
  failed_when: false

- name: Set Go install needed flag
  ansible.builtin.set_fact:
    go_needs_install: "{{ go_installed_version.rc != 0 or ('go' + go_version) not in (go_installed_version.stdout | default('')) }}"

- name: Download Go checksum
  ansible.builtin.uri:
    url: "{{ go_checksum_url }}"
    return_content: true
  register: go_sha256
  when: go_needs_install

- name: Download Go tarball
  ansible.builtin.get_url:
    url: "{{ go_download_url }}"
    dest: "/tmp/go{{ go_version }}.{{ go_os }}-{{ go_arch }}.tar.gz"
    checksum: "sha256:{{ go_sha256.content | trim }}"
    mode: "0644"
  when: go_needs_install

- name: Remove existing Go installation
  ansible.builtin.file:
    path: "{{ go_install_dir }}/go"
    state: absent
  when: go_needs_install

- name: Extract Go tarball
  ansible.builtin.unarchive:
    src: "/tmp/go{{ go_version }}.{{ go_os }}-{{ go_arch }}.tar.gz"
    dest: "{{ go_install_dir }}"
    remote_src: true
  when: go_needs_install

- name: Clean up Go temp files
  ansible.builtin.file:
    path: "/tmp/go{{ go_version }}.{{ go_os }}-{{ go_arch }}.tar.gz"
    state: absent
  when: go_needs_install
