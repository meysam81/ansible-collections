---
- name: Assert remote_write_url is defined
  ansible.builtin.assert:
    that:
      - vmagent_remote_write_url is defined
      - vmagent_remote_write_url | length > 0
    fail_msg: "vmagent_remote_write_url must be defined and non-empty (got: {{ vmagent_remote_write_url | default('undefined') }})"
- name: Assert remote_write_url uses HTTPS
  ansible.builtin.assert:
    that:
      - vmagent_remote_write_url is regex('^https://')
    fail_msg: "vmagent_remote_write_url must use HTTPS (got: {{ vmagent_remote_write_url }})"
  when: not (vmagent_allow_insecure_url | bool)
- name: Create group {{ vmagent_group }}
  ansible.builtin.group:
    name: "{{ vmagent_group }}"
    state: present
    system: true
  register: vmagent_created_group
- name: Create user {{ vmagent_user }}
  ansible.builtin.user:
    name: "{{ vmagent_user }}"
    state: present
    system: true
    shell: /bin/false
    create_home: true
    group: "{{ vmagent_created_group.name }}"
- name: Create secure temp directory
  ansible.builtin.tempfile:
    state: directory
    prefix: vmagent_
  register: vmagent_tmp_dir
- name: Download vmutils
  ansible.builtin.get_url:
    url: "{{ vmagent_vmutils_url }}"
    dest: "{{ vmagent_tmp_dir.path }}/{{ vmagent_vmutils_url | basename }}"
    mode: "0644"
    owner: "{{ vmagent_user }}"
    group: "{{ vmagent_group }}"
  register: vmagent_vmutils_download
- name: Extract & install the binaries
  ansible.builtin.unarchive:
    src: "{{ vmagent_vmutils_download.dest }}"
    dest: /usr/local/bin/
    remote_src: true
    owner: root
    group: root
    extra_opts:
      - vmagent-prod
- name: Clean up vmagent temp files
  ansible.builtin.file:
    path: "{{ vmagent_tmp_dir.path }}"
    state: absent
- name: Ensure vmagent dir exists
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: vmagent
    group: vmagent
    mode: "0755"
  loop:
    - /var/lib/vmagent
    - /var/log/vmagent
    - /etc/vmagent
- name: Place the password file
  ansible.builtin.copy:
    content: "{{ vmagent_remote_write_password }}"
    dest: /etc/vmagent/remote-url-password
    owner: "{{ vmagent_user }}"
    group: "{{ vmagent_group }}"
    mode: "0400"
  when: vmagent_remote_write_password
  no_log: true
- name: Copy service file
  ansible.builtin.template:
    src: vmagent.service.j2
    dest: /etc/systemd/system/vmagent.service
    owner: root
    group: root
    mode: "0644"
  notify: Restart vmagent service
- name: Copy config file
  ansible.builtin.template:
    src: vmagent.yml.j2
    dest: /etc/vmagent/vmagent.yml
    owner: "{{ vmagent_user }}"
    group: "{{ vmagent_group }}"
    mode: "0644"
  notify: Reload vmagent service
- name: Start vmagent service
  ansible.builtin.systemd:
    name: vmagent
    state: started
    enabled: true
    daemon_reload: true
- name: Verify the {{ vmagent_http_listen_addr }}
  ansible.builtin.uri:
    url: "http://{{ vmagent_http_listen_addr }}"
    status_code: 200
    timeout: 5
    method: GET
    validate_certs: false
  when: vmagent_http_listen_addr != ""
  failed_when: false
