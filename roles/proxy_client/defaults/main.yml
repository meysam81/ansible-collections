---
# ── Proxy URL ─────────────────────────────────────────────────────────
# Required. e.g., "http://10.99.0.1:3128"
proxy_client_proxy_url: ""

# ── Exceptions ────────────────────────────────────────────────────────
proxy_client_no_proxy:
  - localhost
  - 127.0.0.1

# ── Scopes ────────────────────────────────────────────────────────────
proxy_client_configure_apt: true
proxy_client_configure_systemd: true

# ── SOCKS Proxy (optional) ────────────────────────────────────────────
# e.g. "socks5h://10.99.0.1:1080"
proxy_client_socks_url: ""
# Deploy GIT_SSH_COMMAND with SOCKS ProxyCommand for git-over-SSH
proxy_client_configure_git_ssh: false
