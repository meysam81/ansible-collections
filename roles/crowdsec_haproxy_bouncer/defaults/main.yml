---
# NOTE: This role installs the CrowdSec HAProxy bouncer but does NOT wire it
# into haproxy.cfg. The role is a stub for future enablement.
#
# To enable CrowdSec:
# 1. Uncomment the crowdsec_haproxy_bouncer role in your playbook
# 2. Add the following to your haproxy.cfg.j2:
#    Global section:
#      lua-load {{ crowdsec_haproxy_bouncer_lua_dir }}/crowdsec.lua
#    Frontend https section:
#      filter spoe engine crowdsec config {{ crowdsec_haproxy_bouncer_config_dir }}/crowdsec.cfg
#      http-request set-header X-CrowdSec-Remediation %[var(txn.crowdsec.remediation)]
#      http-request redirect code 302 location %[var(txn.crowdsec.redirect)]
#        if { var(txn.crowdsec.remediation) -m str "allow" }
#        { var(txn.crowdsec.redirect) -m found }
#      http-request lua.crowdsec_handle if { var(txn.crowdsec.remediation) -m str "captcha" }
#      http-request lua.crowdsec_handle if { var(txn.crowdsec.remediation) -m str "ban" }
#      http-after-response set-header Set-Cookie
#        %[var(txn.crowdsec.captcha_cookie)]
#        if { var(txn.crowdsec.captcha_status) -m found }
#        { var(txn.crowdsec.captcha_cookie) -m found }
#      http-after-response set-header Set-Cookie
#        %[var(txn.crowdsec.captcha_cookie)]
#        if { var(txn.crowdsec.captcha_cookie) -m found }
#        !{ var(txn.crowdsec.captcha_status) -m found }
#    Backends section:
#      backend crowdsec-spoa
#          mode tcp
#          server s1 {{ crowdsec_haproxy_bouncer_spoa_addr }}:{{ crowdsec_haproxy_bouncer_spoa_port }}
#
crowdsec_haproxy_bouncer_enabled: true
crowdsec_haproxy_bouncer_spoa_addr: "127.0.0.1"
crowdsec_haproxy_bouncer_spoa_port: 9001
crowdsec_haproxy_bouncer_lua_dir: "/usr/lib/crowdsec-haproxy-spoa-bouncer/lua"
crowdsec_haproxy_bouncer_html_dir: "/var/lib/crowdsec-haproxy-spoa-bouncer/html"
crowdsec_haproxy_bouncer_config_dir: "/etc/haproxy"
