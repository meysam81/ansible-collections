---
- name: Assert at least one of backends or inline_responders is set
  ansible.builtin.assert:
    that:
      - (haproxy_backends | length > 0) or (haproxy_inline_responders | length > 0)
    fail_msg: >-
      Either haproxy_backends or haproxy_inline_responders must be non-empty
      — the frontend would otherwise have nothing to serve.

- name: Assert routes are defined when backends are
  ansible.builtin.assert:
    that:
      - haproxy_routes | length > 0
    fail_msg: "haproxy_routes must be a non-empty list when haproxy_backends is set"
  when: haproxy_backends | length > 0

- name: Assert all route backends exist
  ansible.builtin.assert:
    that:
      - item.backend in (haproxy_backends | map(attribute='name') | list)
    fail_msg: "Route references unknown backend '{{ item.backend }}'"
  loop: "{{ haproxy_routes }}"

- name: Validate inline responder entries
  ansible.builtin.assert:
    that:
      - item.name is defined
      - item.name is regex('^[A-Za-z0-9_]+$')
      - item.host is defined
      - item.host | length > 0
      - item.path is defined
      - item.path | length > 0
      - item.body is defined
    fail_msg: "Invalid inline responder: {{ item }}"
  loop: "{{ haproxy_inline_responders }}"
  loop_control:
    label: "{{ item.name | default('?') }}"
  when: haproxy_inline_responders | length > 0

- name: Touch cloudflare-ips.txt
  ansible.builtin.file:
    path: "{{ haproxy_cloudflare_ips_file }}"
    owner: haproxy
    group: haproxy
    mode: "0644"
    state: touch
  changed_when: false
  when: haproxy_cloudflare_enabled

- name: Deploy allowed_domains.txt
  ansible.builtin.template:
    src: allowed_domains.txt.j2
    dest: "{{ haproxy_base_config_dir }}/allowed_domains.txt"
    owner: haproxy
    group: haproxy
    mode: "0644"
  notify: Reload haproxy service
  when: haproxy_cors_allowed_domains | length > 0

- name: Deploy HAProxy config
  ansible.builtin.template:
    src: haproxy.cfg.j2
    dest: "{{ haproxy_base_config_dir }}/haproxy.cfg"
    owner: haproxy
    group: haproxy
    mode: "0644"
    validate: "haproxy -f %s -c"
  notify: Reload haproxy service
