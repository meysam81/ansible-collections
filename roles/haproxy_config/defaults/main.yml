---
# Performance
haproxy_maxconn: 4096
haproxy_threads: "{{ ansible_facts['processor_vcpus'] }}"

# Timeouts
haproxy_timeout_connect: "5s"
haproxy_timeout_client: "50s"
haproxy_timeout_server: "50s"
haproxy_timeout_http_request: "15s"
haproxy_timeout_http_keep_alive: "15s"
haproxy_timeout_queue: "30s"
haproxy_timeout_tunnel: "3600s"

# TLS
haproxy_tls_min_version: "TLSv1.2"
haproxy_tls_ciphersuites: "TLS_AES_256_GCM_SHA384:TLS_CHACHA20_POLY1305_SHA256:TLS_AES_128_GCM_SHA256"
# SSL Labs A+ / Mozilla "Modern intermediate"-grade default. ECDHE-only AEAD,
# zero DHE so there are no DH params to size or rotate. `@SECLEVEL=2` raises
# OpenSSL's security level: SHA-1 in the TLS handshake `signature_algorithms`
# extension is forbidden, and RSA/DH keys < 2048 bits are forbidden. Order
# of preference within the list: AES-256-GCM > CHACHA20-POLY1305 > AES-128-GCM,
# with ECDSA preferred over RSA per algorithm so an ECDSA cert is fully
# utilised when present. Override only if you need to interoperate with
# legacy clients that lack ECDHE.
haproxy_tls_ciphers: >-
  @SECLEVEL=2:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256
# `no-tls-tickets`: session tickets disabled. Rotating ticket keys correctly
# is operationally hard and a known footgun; A+ does not require tickets and
# session caching covers the resumption case.
haproxy_tls_options: "no-tls-tickets"
# Default false to match the ECDHE-only cipher list above. The template
# filters DHE-* entries out of the final cipher string when this is false,
# so reintroducing DHE in an override requires flipping both this flag AND
# adding DHE-* entries to `haproxy_tls_ciphers`.
haproxy_tls_allow_dhe: false

haproxy_global_ciphers_extra: []

haproxy_quic_enabled: false

# Frontend bind addresses for ports 80/443. Default is dual-stack wildcard:
# every IPv4 and every IPv6 address on the host. Override to bind to
# specific NICs or to disable a family:
#   ["*"]                            # IPv4-only
#   ["::"]                           # IPv6-only
#   ["10.0.0.5", "2001:db8::5"]      # specific addresses (raw, no brackets)
# On Linux, HAProxy sets IPV6_V6ONLY=1 on `::` sockets so `*` and `::`
# coexist without duplicate-bind errors. The template adds [] brackets to
# IPv6 literals when rendering bind lines.
haproxy_bind_addresses:
  - "*"
  - "::"

# OCSP stapling for all loaded certificates. When true, the global
# `ocsp-update.mode on` directive is rendered, which makes HAProxy fetch
# OCSP responses via its built-in updater and staple them into the TLS
# handshake. Removes the client-side OCSP fetch round-trip and contributes
# to SSL Labs A+. Requires HAProxy >= 3.0 (the canonical `ocsp-update.mode`
# global keyword; older 2.8/2.9 used a different spelling and per-cert
# crt-list configuration). Also requires outbound HTTPS from the host to
# the OCSP responder named in each certificate's AIA extension.
haproxy_ocsp_stapling_enabled: true

# SSL tuning
haproxy_dh_param_bits: 4096
haproxy_bufsize: 32768
haproxy_maxrewrite: 8192
haproxy_ssl_maxrecord: 1460
haproxy_ssl_cachesize: 100000

# Stats
haproxy_stats_port: 8404
haproxy_stats_auth_user: ""
haproxy_stats_auth_password: ""

# ── Feature flags ───────────────────────────────────────────────────
haproxy_cloudflare_enabled: false
haproxy_rate_limiting_enabled: true
haproxy_security_headers_enabled: true
haproxy_cache_control_enabled: true

# ── Backends ────────────────────────────────────────────────────────
# List of backend definitions. Each entry:
#   name:              (required) backend name used in routes
#   servers:           (required) list of { name, address, port }
#   mode:              http (default) or tcp
#   balance:           roundrobin, leastconn, etc. (omit for haproxy default)
#   health_check:      "GET /healthz" or omit to skip httpchk
#   options:           [] list of raw haproxy lines injected into backend
haproxy_backends: []

# ── Routes (frontend web → backend) ────────────────────────────────
# List of routing rules evaluated in order. Each entry:
#   backend:           (required) name matching a haproxy_backends entry
#   match:             (required) one of:
#     host:            exact host match, e.g. "app.example.com"
#     host_suffix:     suffix match, e.g. "example.com" matches *.example.com
#     path_prefix:     path prefix match, e.g. "/api"
haproxy_routes: []

# ── Inline responders (host+path → static body) ────────────────────
# Returned directly from the web frontend before any backend lookup.
# Useful for static well-known files: MTA-STS policy, ACME http-01,
# robots.txt, health probes. Generic by design — callers supply the
# host, path, and body. Body must be ASCII; non-ASCII characters need
# explicit escaping for HAProxy's `string` argument format.
#
# Each entry:
#   name:           (required) unique slug used to derive ACL names
#                   (must match ^[A-Za-z0-9_]+$)
#   host:           (required) exact host header match (case-insensitive)
#   path:           (required) exact path match
#   status:         (default 200) HTTP status code
#   content_type:   (default "text/plain; charset=utf-8")
#   body:           (required) response body; \n for newlines
#   only_https:     (default true) only fire on TLS-terminated requests
haproxy_inline_responders: []

# ── Listen sections (TCP passthrough, etc.) ─────────────────────────
# List of raw listen blocks. Each entry:
#   name:              (required) section name
#   bind:              (required) e.g. ":6443"
#   mode:              tcp (default) or http
#   servers:           (required) list of { name, address, port }
#   options:           [] list of raw haproxy lines
#   rate_limit:        optional { conn_rate: 10, conn_cur: 5, gpc0_rate: 100 }
haproxy_listen_sections: []

# ── Cloudflare (only when haproxy_cloudflare_enabled) ───────────────
haproxy_cloudflare_ips_file: "/etc/haproxy/cloudflare-ips.txt"
haproxy_cloudflare_bypass_hosts: []

# ── CORS ────────────────────────────────────────────────────────────
haproxy_cors_allowed_domains: []
haproxy_cors_subdomain_patterns: []
haproxy_cdn_domains: []
haproxy_cors_allowed_methods: "GET, POST, PUT, PATCH, DELETE, OPTIONS"
haproxy_cors_allowed_headers: "Content-Type, Authorization, X-Requested-With, Accept, Origin, X-CSRF-Token, X-Unique-ID"
haproxy_cors_expose_headers: "X-Unique-ID, X-Request-ID, Content-Length, Content-Type, Date"
haproxy_cors_max_age: "3600"
haproxy_cors_allow_credentials: true
haproxy_allow_options_all_origins: false

# ── Rate limiting (only when haproxy_rate_limiting_enabled) ─────────
haproxy_rate_limit_http_req_period: 10
haproxy_rate_limit_http_req_count: 100
haproxy_rate_limit_conn_period: 10
haproxy_rate_limit_conn_count: 50
haproxy_rate_limit_concurrent: 20
haproxy_rate_limit_api_period: 60
haproxy_rate_limit_api_count: 200
haproxy_rate_limit_api_path_prefix: "/api/"

# ── Security headers (only when haproxy_security_headers_enabled) ───
haproxy_csp: >-
  default-src 'self' https:;
  style-src 'self' 'unsafe-inline' https:;
  img-src 'self' blob: data: https:;
  font-src 'self' data: https:;
  object-src 'none';
  upgrade-insecure-requests
haproxy_x_xss_protection: "1; mode=block"
haproxy_coep: "unsafe-none"
haproxy_coop: "same-origin"
haproxy_corp: "same-site"
haproxy_x_frame_options: "SAMEORIGIN"
haproxy_referrer_policy: "strict-origin-when-cross-origin"
haproxy_permissions_policy: "geolocation=(), microphone=(), camera=(), payment=(), usb=(), magnetometer=(), gyroscope=(), fullscreen=(self), sync-xhr=()"
haproxy_hsts_max_age: 63072000
haproxy_hsts_include_subdomains: true
haproxy_hsts_preload: true

# ── Cache-Control (only when haproxy_cache_control_enabled) ─────────
haproxy_cache_control_default: "no-cache"
haproxy_cache_control_hashed: "public, max-age=31536000, immutable"
haproxy_cache_control_static: "public, max-age=86400, must-revalidate"
haproxy_static_extensions:
  - js
  - css
  - woff
  - woff2
  - ttf
  - eot
  - svg
  - png
  - jpg
  - jpeg
  - gif
  - ico
  - webp
  - avif
haproxy_hashed_asset_regex: '(/|[.~_-])[A-Za-z0-9_-]{6,64}\\.(js|css|woff2?|ttf|png|jpe?g|gif|svg|webp|avif|ico|map)$'

# ── Request filtering ───────────────────────────────────────────────
haproxy_blocked_extensions:
  - php
  - asp
  - aspx
  - jsp
haproxy_blocked_user_agents:
  - nmap
  - nikto
  - sqlmap
  - dirb
  - masscan
haproxy_honeypot_enabled: true
haproxy_honeypot_fields:
  - name
  - company
  - website

# ── WAF ─────────────────────────────────────────────────────────────
haproxy_coraza_enabled: false
haproxy_coraza_spoa_addr: "127.0.0.1"
haproxy_coraza_spoa_port: 9000

# ── Compression ─────────────────────────────────────────────────────
haproxy_compression_types:
  - text/html
  - text/plain
  - text/css
  - text/javascript
  - application/javascript
  - application/json
  - application/xml
  - image/svg+xml
  - application/wasm
  - application/manifest+json

# ── Default backend behaviour ───────────────────────────────────────
# When set, unmatched requests receive a 301 redirect to this URL.
# When empty, the default backend returns plain 404.
haproxy_default_redirect_url: ""

# ── Misc ────────────────────────────────────────────────────────────
haproxy_alt_svc_enabled: true
haproxy_option_forwardfor: true

# ── Escape hatches (raw lines injected into sections) ───────────────
haproxy_global_extra: []
haproxy_defaults_extra: []
haproxy_frontend_extra_acls: []
haproxy_frontend_extra_rules: []
