---
# ── Interfaces ─────────────────────────────────────────────────────────
egress_firewall_tunnel_interface: wg0
egress_firewall_nat_interface: eth0

# ── Proxy ──────────────────────────────────────────────────────────────
egress_firewall_proxy_port: 3128
egress_firewall_proxy_user: proxy

# ── DNS ────────────────────────────────────────────────────────────────
egress_firewall_dns_port: 53

# ── IPv6 ───────────────────────────────────────────────────────────────
egress_firewall_ipv6_enabled: false

# ── Exceptions ─────────────────────────────────────────────────────────
# INPUT exceptions: extra services on the gateway reachable from tunnel.
# Each entry: { proto: tcp|udp, dport: <int>, comment: "..." }
egress_firewall_input_exceptions: []

# FORWARD exceptions: traffic that bypasses the proxy entirely.
# Each entry: { proto: tcp|udp, dport: <int>, comment: "..." }
# Optional: dest: "<CIDR>" to restrict to specific destination (omit for any).
# Use sparingly — each entry punches a hole in the enforcement.
egress_firewall_forward_exceptions: []

# ── SOCKS Proxy (optional) ────────────────────────────────────────────
# Enable to allow a SOCKS proxy (e.g. microsocks, Dante) alongside the HTTP proxy.
# Adds INPUT accept for socks_port and MASQUERADE for socks_user.
egress_firewall_socks_enabled: false
egress_firewall_socks_port: 1080
egress_firewall_socks_user: sockd

# ── SOCKS Output Filtering (optional) ─────────────────────────────────
# Port allowlist for SOCKS proxy outbound connections.
# When non-empty AND socks_enabled, only these destination ports are
# permitted for the SOCKS user's OUTPUT. Empty list = no restriction
# (backward compatible with Dante setups that filter ports internally).
egress_firewall_socks_allowed_ports: []

# Block SOCKS proxy from reaching RFC1918, loopback, and link-local.
egress_firewall_socks_block_private: true
