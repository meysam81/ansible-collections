---
- name: Assert wireguard_role is valid
  ansible.builtin.assert:
    that:
      - wireguard_role in ['server', 'client']
    fail_msg: "wireguard_role must be 'server' or 'client' (got: {{ wireguard_role }})"

- name: Assert wireguard_address is defined
  ansible.builtin.assert:
    that:
      - wireguard_address | length > 0
    fail_msg: "wireguard_address must be defined and non-empty"

- name: Assert wireguard_private_key is defined
  ansible.builtin.assert:
    that:
      - wireguard_private_key | length > 0
    fail_msg: "wireguard_private_key must be defined and non-empty"
  no_log: true

- name: Assert wireguard_peers is not empty
  ansible.builtin.assert:
    that:
      - wireguard_peers | length > 0
    fail_msg: "wireguard_peers must be a non-empty list"

- name: Assert wireguard_nat_source is set when NAT is enabled
  ansible.builtin.assert:
    that:
      - wireguard_nat_source | length > 0
    fail_msg: >-
      wireguard_nat_source must be set when NAT is enabled.
      It should match the subnet of wireguard_address (e.g. if
      wireguard_address is "10.99.0.1/24", set wireguard_nat_source
      to "10.99.0.0/24").
  when:
    - wireguard_role == 'server'
    - wireguard_nat_enabled

- name: Assert wireguard_nat_source_ipv6 is valid when set
  ansible.builtin.assert:
    that:
      - wireguard_nat_source_ipv6 is regex('^[0-9a-fA-F:]+/[0-9]+$')
    fail_msg: "wireguard_nat_source_ipv6 must be a valid IPv6 CIDR"
  when:
    - wireguard_role == 'server'
    - wireguard_nat_enabled
    - wireguard_nat_source_ipv6 | length > 0

- name: Assert each peer has required fields
  ansible.builtin.assert:
    that:
      - peer.public_key is defined
      - peer.public_key | length > 0
      - peer.allowed_ips is defined
      - peer.allowed_ips | length > 0
    fail_msg: "Peer at index {{ idx }} missing public_key or allowed_ips"
  loop: "{{ wireguard_peers }}"
  loop_control:
    index_var: idx
    loop_var: peer
    label: "{{ peer.name | default('peer-' ~ idx) }}"

- name: Assert no duplicate public keys
  ansible.builtin.assert:
    that:
      - wireguard_peers | map(attribute='public_key') | list | unique | length == wireguard_peers | length
    fail_msg: "Duplicate public_key found in wireguard_peers"

- name: Assert no duplicate allowed_ips
  ansible.builtin.assert:
    that:
      - wireguard_peers | map(attribute='allowed_ips') | list | unique | length == wireguard_peers | length
    fail_msg: "Duplicate allowed_ips found in wireguard_peers"

- name: Setup WireGuard on Debian/Ubuntu
  ansible.builtin.import_tasks: setup-Debian.yml
  when: ansible_facts['os_family'] == 'Debian'
