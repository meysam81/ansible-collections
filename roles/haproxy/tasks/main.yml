---
- name: Assert backends are defined
  ansible.builtin.assert:
    that:
      - haproxy_backends | length > 0
    fail_msg: "haproxy_backends must be a non-empty list"

- name: Assert routes are defined
  ansible.builtin.assert:
    that:
      - haproxy_routes | length > 0
    fail_msg: "haproxy_routes must be a non-empty list"

- name: Assert all route backends exist
  ansible.builtin.assert:
    that:
      - item.backend in (haproxy_backends | map(attribute='name') | list)
    fail_msg: "Route references unknown backend '{{ item.backend }}'"
  loop: "{{ haproxy_routes }}"

- name: Create haproxy user
  ansible.builtin.user:
    name: haproxy
    system: true
    shell: /bin/false
    home: /var/lib/haproxy
    create_home: false

- name: Create HAProxy directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: haproxy
    group: haproxy
    mode: "0755"
  loop:
    - "{{ haproxy_config_dir }}"
    - "{{ haproxy_errors_dir }}"

- name: Create HAProxy certificate directory
  ansible.builtin.file:
    path: "{{ haproxy_cert_dir }}"
    state: directory
    owner: haproxy
    group: haproxy
    mode: "0750"

- name: Touch cloudflare-ips.txt
  ansible.builtin.file:
    path: "{{ haproxy_cloudflare_ips_file }}"
    owner: haproxy
    group: haproxy
    mode: "0644"
    state: touch
  changed_when: false
  when: haproxy_cloudflare_enabled

- name: Copy HAProxy error files from build
  ansible.builtin.copy:
    src: /usr/local/share/haproxy/errors/
    dest: "{{ haproxy_errors_dir }}/"
    owner: haproxy
    group: haproxy
    mode: "0644"
    remote_src: true

- name: Copy custom error pages
  ansible.builtin.copy:
    src: "errors/"
    dest: "{{ haproxy_errors_dir }}/"
    owner: haproxy
    group: haproxy
    mode: "0644"

- name: Deploy allowed_domains.txt
  ansible.builtin.template:
    src: allowed_domains.txt.j2
    dest: "{{ haproxy_config_dir }}/allowed_domains.txt"
    owner: haproxy
    group: haproxy
    mode: "0644"
  notify: Reload haproxy service
  when: haproxy_cors_allowed_domains | length > 0

- name: Deploy HAProxy config
  ansible.builtin.template:
    src: haproxy.cfg.j2
    dest: "{{ haproxy_config_dir }}/haproxy.cfg"
    owner: haproxy
    group: haproxy
    mode: "0640"
    validate: "haproxy -f %s -c -q"
  notify: Reload haproxy service

- name: Deploy haproxy systemd service
  ansible.builtin.template:
    src: haproxy.service.j2
    dest: /etc/systemd/system/haproxy.service
    owner: root
    group: root
    mode: "0644"
  notify: Start haproxy service
