---
- name: Assert required variables
  ansible.builtin.assert:
    that:
      - served_domains | length > 0
    fail_msg: "served_domains must be a non-empty list"

- name: Assert served_domains contain valid domain names
  ansible.builtin.assert:
    that:
      - item is regex('^[a-zA-Z0-9]([a-zA-Z0-9-]*[a-zA-Z0-9])?(\.[a-zA-Z0-9]([a-zA-Z0-9-]*[a-zA-Z0-9])?)*\.[a-zA-Z]{2,}$')
    fail_msg: "Invalid domain name: {{ item }}"
  loop: "{{ served_domains }}"

- name: Create haproxy user
  ansible.builtin.user:
    name: haproxy
    system: true
    shell: /bin/false
    home: /var/lib/haproxy
    create_home: false

- name: Create HAProxy directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: haproxy
    group: haproxy
    mode: "0755"
  loop:
    - "{{ haproxy_config_dir }}"
    - "{{ haproxy_errors_dir }}"

- name: Create HAProxy certificate directory
  ansible.builtin.file:
    path: "{{ haproxy_cert_dir }}"
    state: directory
    owner: haproxy
    group: haproxy
    mode: "0750"

- name: Touch cloudflare-ips.txt
  ansible.builtin.file:
    path: "{{ cloudflare_ips_file }}"
    owner: haproxy
    group: haproxy
    mode: "0644"
    state: touch
  changed_when: false

- name: Copy HAProxy error files from build
  ansible.builtin.copy:
    src: "{{ ansible_user_dir }}/haproxy-{{ haproxy_version }}/examples/errorfiles/"
    dest: "{{ haproxy_errors_dir }}/"
    owner: haproxy
    group: haproxy
    mode: "0644"
    remote_src: true

- name: Copy custom error pages
  ansible.builtin.copy:
    src: "errors/"
    dest: "{{ haproxy_errors_dir }}/"
    owner: haproxy
    group: haproxy
    mode: "0644"

- name: Deploy allowed_domains.txt
  ansible.builtin.template:
    src: allowed_domains.txt.j2
    dest: "{{ haproxy_config_dir }}/allowed_domains.txt"
    owner: haproxy
    group: haproxy
    mode: "0644"
  notify: Reload haproxy service

- name: Deploy HAProxy config
  ansible.builtin.template:
    src: haproxy.cfg.j2
    dest: "{{ haproxy_config_dir }}/haproxy.cfg"
    owner: haproxy
    group: haproxy
    mode: "0640"
    validate: "haproxy -f %s -c -q"
  notify: Reload haproxy service

- name: Deploy haproxy systemd service
  ansible.builtin.template:
    src: haproxy.service.j2
    dest: /etc/systemd/system/haproxy.service
    owner: root
    group: root
    mode: "0644"
  notify: Start haproxy service
