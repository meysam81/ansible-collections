---
crowdsec_agent_collections:
  - crowdsecurity/http-probing
  - crowdsecurity/iptables

crowdsec_agent_enrollment_key: ""

crowdsec_agent_acquis_extra: []

# Filename (without extension) for extra acquisition config in /etc/crowdsec/acquis.d/
crowdsec_agent_acquis_filename: egress

crowdsec_agent_lapi_listen: "127.0.0.1:8080"

# Override apt codename when the detected release isn't available upstream.
# e.g. set to "bookworm" on Debian Trixie where CrowdSec lacks a repo.
crowdsec_agent_apt_codename: "{{ ansible_facts['distribution_release'] }}"
