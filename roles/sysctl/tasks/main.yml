---
- name: Assert sysctl_params is a non-empty dict
  ansible.builtin.assert:
    that:
      - sysctl_params is mapping
      - sysctl_params | length > 0
    fail_msg: "sysctl_params must be a non-empty dict"

- name: Ensure sysctl.d directory exists
  ansible.builtin.file:
    path: "{{ sysctl_file | dirname }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Deploy sysctl configuration
  ansible.builtin.template:
    src: sysctl.conf.j2
    dest: "{{ sysctl_file }}"
    owner: root
    group: root
    mode: "0644"
  notify: Reload sysctl
