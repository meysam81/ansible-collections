---
- name: Verify new roles
  hosts: all
  become: true
  tasks:
    # ── blocklist_updater ─────────────────────────
    - name: Check blocklist directory exists
      ansible.builtin.stat:
        path: /tmp/blocklists
      register: blocklist_dir
      tags: blocklist_updater

    - name: Assert blocklist directory exists
      ansible.builtin.assert:
        that:
          - blocklist_dir.stat.exists
          - blocklist_dir.stat.isdir
      tags: blocklist_updater

    - name: Check update-blocklists script exists
      ansible.builtin.stat:
        path: /usr/local/bin/update-blocklists
      register: blocklist_script
      tags: blocklist_updater

    - name: Assert update-blocklists script is executable
      ansible.builtin.assert:
        that:
          - blocklist_script.stat.exists
          - blocklist_script.stat.executable
      tags: blocklist_updater

    - name: Gather service facts for blocklist_updater
      ansible.builtin.service_facts:
      tags: blocklist_updater

    - name: Assert blocklist-updater timer is active and enabled
      ansible.builtin.assert:
        that:
          - "'blocklist-updater.timer' in ansible_facts.services"
          - ansible_facts.services['blocklist-updater.timer'].state == 'active'
          - ansible_facts.services['blocklist-updater.timer'].status == 'enabled'
      tags: blocklist_updater

    # ── squid ─────────────────────────────────────
    - name: Gather service facts for squid
      ansible.builtin.service_facts:
      tags: squid

    - name: Assert squid service is running and enabled
      ansible.builtin.assert:
        that:
          - "'squid.service' in ansible_facts.services"
          - ansible_facts.services['squid.service'].state == 'running'
          - ansible_facts.services['squid.service'].status == 'enabled'
      tags: squid

    - name: Check squid configuration is valid
      ansible.builtin.command:
        cmd: squid -k parse
      register: squid_parse
      changed_when: false
      failed_when: false
      tags: squid

    - name: Assert squid configuration is valid
      ansible.builtin.assert:
        that:
          - squid_parse.rc == 0
      tags: squid

    - name: Check squid log directory exists
      ansible.builtin.stat:
        path: /var/log/squid
      register: squid_log_dir
      tags: squid

    - name: Assert squid log directory exists with correct ownership
      ansible.builtin.assert:
        that:
          - squid_log_dir.stat.exists
          - squid_log_dir.stat.isdir
      tags: squid

    - name: Check squid logrotate config exists
      ansible.builtin.stat:
        path: /etc/logrotate.d/squid-json
      register: squid_logrotate
      when: squid_access_log_format | default('json') == 'json'
      tags: squid

    - name: Assert squid logrotate config exists
      ansible.builtin.assert:
        that:
          - squid_logrotate.stat.exists
      when: squid_access_log_format | default('json') == 'json'
      tags: squid

    # ── crowdsec_agent ────────────────────────────
    - name: Gather service facts for crowdsec_agent
      ansible.builtin.service_facts:
      tags: crowdsec_agent

    - name: Assert crowdsec service is running and enabled
      ansible.builtin.assert:
        that:
          - "'crowdsec.service' in ansible_facts.services"
          - ansible_facts.services['crowdsec.service'].state == 'running'
          - ansible_facts.services['crowdsec.service'].status == 'enabled'
      tags: crowdsec_agent

    - name: Check CrowdSec GPG keyring exists
      ansible.builtin.stat:
        path: /usr/share/keyrings/crowdsec-archive-keyring.gpg
      register: crowdsec_keyring
      tags: crowdsec_agent

    - name: Assert CrowdSec GPG keyring exists
      ansible.builtin.assert:
        that:
          - crowdsec_keyring.stat.exists
      tags: crowdsec_agent

    - name: Check CrowdSec collections are installed
      ansible.builtin.command:
        cmd: cscli collections list -o raw
      register: crowdsec_collections
      changed_when: false
      tags: crowdsec_agent

    - name: Assert default collections are installed
      ansible.builtin.assert:
        that:
          - "'http-probing' in crowdsec_collections.stdout"
          - "'iptables' in crowdsec_collections.stdout"
      tags: crowdsec_agent
