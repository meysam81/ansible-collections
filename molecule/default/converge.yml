---
- name: Converge
  hosts: all
  gather_facts: true
  become: true
  vars:
    haproxy_backends:
      - name: app
        servers:
          - { name: sv0, address: "127.0.0.1", port: 80 }
        health_check: "GET /healthz"
    haproxy_routes:
      - match: { host_suffix: "example.com" }
        backend: app
  pre_tasks:
    - name: Ping
      ansible.builtin.ping:
    - name: Generate test TLS certificate for HAProxy
      ansible.builtin.include_tasks: ../../tests/generate-test-cert.yml
      tags: haproxy
    - name: Install wireguard-tools for key generation
      ansible.builtin.apt:
        name: wireguard-tools
        state: present
        update_cache: true
      tags: wireguard
    - name: Generate WireGuard server private key
      ansible.builtin.command:
        cmd: wg genkey
      register: wg_server_privkey
      changed_when: false
      tags: wireguard
    - name: Derive WireGuard server public key
      ansible.builtin.command:
        cmd: wg pubkey
        stdin: "{{ wg_server_privkey.stdout }}"
      register: wg_server_pubkey
      changed_when: false
      tags: wireguard
    - name: Generate WireGuard peer private key
      ansible.builtin.command:
        cmd: wg genkey
      register: wg_peer_privkey
      changed_when: false
      tags: wireguard
    - name: Derive WireGuard peer public key
      ansible.builtin.command:
        cmd: wg pubkey
        stdin: "{{ wg_peer_privkey.stdout }}"
      register: wg_peer_pubkey
      changed_when: false
      tags: wireguard
  tasks:
    - name: Copy relabling config
      ansible.builtin.copy:
        content: |
          - source_labels:
              - exported_job
            action: replace
            target_label: job
            regex: (.+)
          - source_labels:
              - exported_instance
            action: replace
            target_label: instance
            regex: (.+)
        dest: /etc/vmagent/relablings.yml
        owner: vmagent
        group: vmagent
        mode: "0644"
      notify: Restart vmagent service
      tags: vmagent
    - name: Ensure vmagent.service is running
      ansible.builtin.command: systemctl status vmagent
      register: vmagent_service_status
      changed_when: false
      tags: vmagent
  roles:
    - role: golang
      tags: golang
    - role: haproxy
      tags: haproxy
    - role: haproxy_tls_certificate
      tags: haproxy_tls_certificate
      vars:
        haproxy_tls_certificate_email: "{{ lookup('env', 'TLS_CERT_EMAIL') | default('admin@example.com', true) }}"
        haproxy_tls_certificate_cloudflare_dns_api_token: "{{ lookup('env', 'CLOUDFLARE_DNS_API_TOKEN') | default('dummy', true) }}"
    - role: cloudflare_ips
      tags: cloudflare_ips
    - role: coraza
      tags: coraza
    - role: crowdsec_haproxy_bouncer
      tags: crowdsec_haproxy_bouncer
    - role: node_exporter
      tags: node_exporter
    - role: vmagent
      tags: vmagent
      vars:
        vmagent_remote_write_url: "{{ lookup('env', 'VMAGENT_REMOTE_WRITE_URL') | default('http://localhost:8428/api/v1/write', true) }}"
        vmagent_allow_insecure_url: true
        vmagent_extra_cli_flags:
          - -remoteWrite.urlRelabelConfig=/etc/vmagent/relablings.yml
    - role: promtail
      tags: promtail
      vars:
        promtail_remote_write_url: "{{ lookup('env', 'PROMTAIL_REMOTE_WRITE_URL') | default('http://localhost:3100/loki/api/v1/push', true) }}"
        promtail_allow_insecure_url: true
    - role: pushgateway
      tags: pushgateway
    - role: sysctl
      tags: sysctl
      vars:
        sysctl_params:
          net.ipv4.ip_forward: 1
    - role: ufw
      tags: ufw
      vars:
        ufw_rules:
          - { rule: allow, port: "22", proto: tcp, comment: "SSH" }
    - role: wireguard
      tags: wireguard
      vars:
        wireguard_role: server
        wireguard_address: "10.99.0.1/24"
        wireguard_private_key: "{{ wg_server_privkey.stdout }}"
        wireguard_nat_source: "10.99.0.0/24"
        wireguard_peers:
          - public_key: "{{ wg_peer_pubkey.stdout }}"
            allowed_ips: "10.99.0.2/32"
    - role: blocklist_updater
      tags: blocklist_updater
      vars:
        blocklist_updater_dir: /tmp/blocklists
    - role: squid
      tags: squid
      vars:
        squid_listen_address: "127.0.0.1"
    - role: crowdsec_agent
      tags: crowdsec_agent
