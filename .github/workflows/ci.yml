name: ci

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main

env:
  ANSIBLE_FORCE_COLOR: "1"
  PY_COLORS: "1"

jobs:
  trivy:
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        scan-type:
          - fs
          - config
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Cache trivy db
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/trivy
            ~/work/temp
          key: ${{ runner.os }}-trivy-db-${{ hashFiles('**/trivy.yaml') }}
          restore-keys: |
            ${{ runner.os }}-trivy-db-
      - name: Run Trivy vulnerability scanner in fs mode
        uses: aquasecurity/trivy-action@master
        with:
          format: sarif
          ignore-unfixed: true
          output: trivy-results.sarif
          scan-ref: .
          scan-type: ${{ matrix.scan-type }}
          severity: CRITICAL,HIGH
          trivy-config: trivy.yaml
      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: "trivy-results.sarif"

  discover-roles:
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    outputs:
      roles: ${{ steps.roles.outputs.roles }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - id: roles
        name: Discover testable roles
        env:
          EXCLUDE: cloudflare_ips coraza crowdsec_haproxy_bouncer golang haproxy_build lego haproxy_tls_certificate
        run: |
          roles=$(find roles/ -mindepth 1 -maxdepth 1 -type d -printf '%f\n' | sort \
            | while read -r role; do
                echo "$EXCLUDE" | tr ' ' '\n' | grep -qx "$role" || echo "$role"
              done \
            | jq -Rsc 'split("\n") | map(select(. != ""))')
          echo "roles=$roles" >> "$GITHUB_OUTPUT"

  test:
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    needs: discover-roles
    runs-on: ubuntu-latest
    permissions:
      contents: read
    services:
      prometheus:
        image: prom/prometheus:v3.10.0
        ports:
          - 9090:9090
      loki:
        image: grafana/loki:3.7.1
        ports:
          - 3100:3100
    strategy:
      fail-fast: false
      matrix:
        role: ${{ fromJson(needs.discover-roles.outputs.roles) }}
    env:
      VMAGENT_REMOTE_WRITE_URL: http://localhost:9090/api/v1/write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Check ansible
        run: ansible --version
      - name: Cache Ansible collections
        uses: actions/cache@v5
        with:
          path: |
            ~/.ansible/collections
            ~/.ansible/plugins
          key: ${{ runner.os }}-ansible-${{ hashFiles('**/requirements.yml') }}
          restore-keys: |
            ${{ runner.os }}-ansible-
      - name: Prepare localhost inventory
        run: |
          cat << 'EOF' > localhost.yml
          all:
            hosts:
              localhost:
                ansible_connection: local
          EOF
      - name: Install the dependencies
        run: |
          ansible-galaxy collection install -r requirements.yml
          ansible-galaxy collection install ./
      - name: Ansible playbook
        run: ansible-playbook playbook.yml -i localhost.yml -t ${{ matrix.role }}

  release-please:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    outputs:
      releases_created: ${{ steps.release-please.outputs.releases_created }}
      tag_name: ${{ steps.release-please.outputs.tag_name }}
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - id: release-please
        name: Release please
        uses: googleapis/release-please-action@v4

  publish-galaxy:
    needs:
      - test
      - release-please
    if: needs.release-please.outputs.releases_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}
      - name: Build collection
        run: ansible-galaxy collection build
      - id: publish
        name: Publish to Ansible Galaxy
        env:
          ANSIBLE_GALAXY_TOKEN: ${{ secrets.ANSIBLE_GALAXY_TOKEN }}
        run: |
          namespace="$(yq -r .namespace galaxy.yml)"
          name="$(yq -r .name galaxy.yml)"
          version="$(yq -r .version galaxy.yml)"

          ansible-galaxy collection publish \
            "$namespace-$name-$version.tar.gz" \
            --token "$ANSIBLE_GALAXY_TOKEN"

  ansible-lint:
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Run ansible-lint
        uses: ansible/ansible-lint@main
        with:
          setup_python: "true"
          requirements_file: requirements.yml

  sonarcloud:
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
